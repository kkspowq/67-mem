<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes">
    <title>67 GAME — ТУН ТУН ТУН САХУР</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #0a0a0a;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            position: relative;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, #1a1a2e 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        .bg-67 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            opacity: 0.08;
        }
        .bg-67 span {
            font-size: 48px;
            color: #c084fc;
            font-weight: 900;
            transform: rotate(15deg);
        }

        .game-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .counter-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        .counter-label {
            color: #ff6b9d;
            font-size: 22px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #ff3366, 0 0 40px #ff3366;
            margin-bottom: 5px;
            animation: pulse 1s infinite;
        }
        .counter-number {
            color: #fff;
            font-size: 72px;
            font-weight: 900;
            text-shadow: 
                0 0 20px #a855f7,
                0 0 60px #7c3aed,
                0 0 100px #5b21b6,
                3px 3px 0 #000;
            line-height: 1;
            letter-spacing: 4px;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        .music-btn {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: #ff3366;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 50px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff3366, 0 10px 20px rgba(0,0,0,0.5);
            animation: shake 0.5s infinite;
            text-transform: uppercase;
            display: block;
            transition: 0.2s;
        }
        .music-btn:active {
            transform: translateX(-50%) scale(0.9);
        }
        .music-btn.hidden {
            display: none;
        }

        @keyframes shake {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(2deg); }
            50% { transform: translateX(-50%) rotate(0deg); }
            75% { transform: translateX(-50%) rotate(-2deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* ===== ТАНЦУЮЩАЯ КАРТИНКА (ТОЛЬКО GIF) ===== */
        .dancer-image {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            width: 180px;
            height: 180px;
            border-radius: 20px;
            box-shadow: 0 0 40px #a855f7, 0 0 80px #7c3aed;
            object-fit: cover;
        }

        /* ===== СТИКМЕН ===== */
        .dancer {
            position: absolute;
            bottom: 100px;
            left: 15%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 0.4s infinite alternate ease-in-out;
            opacity: 0.5;
        }

        .stickman {
            position: relative;
            width: 80px;
            height: 140px;
        }

        .head {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 25px #a78bfa;
            animation: headShake 0.3s infinite alternate;
        }
        .head::before {
            content: "67";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 900;
            color: #7c3aed;
        }

        .body {
            width: 6px;
            height: 45px;
            background: #fff;
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #c084fc;
        }

        .arm-left {
            width: 6px;
            height: 35px;
            background: #fff;
            position: absolute;
            top: 44px;
            left: 22px;
            transform-origin: top center;
            animation: armWaveLeft 0.3s infinite alternate;
            box-shadow: 0 0 10px #a78bfa;
            border-radius: 3px;
        }
        .arm-right {
            width: 6px;
            height: 35px;
            background: #fff;
            position: absolute;
            top: 44px;
            right: 22px;
            transform-origin: top center;
            animation: armWaveRight 0.3s infinite alternate;
            box-shadow: 0 0 10px #a78bfa;
            border-radius: 3px;
        }

        .leg-left {
            width: 6px;
            height: 40px;
            background: #fff;
            position: absolute;
            top: 82px;
            left: 28px;
            transform-origin: top center;
            animation: legKickLeft 0.3s infinite alternate;
            box-shadow: 0 0 10px #c084fc;
            border-radius: 3px;
        }
        .leg-right {
            width: 6px;
            height: 40px;
            background: #fff;
            position: absolute;
            top: 82px;
            right: 28px;
            transform-origin: top center;
            animation: legKickRight 0.3s infinite alternate;
            box-shadow: 0 0 10px #c084fc;
            border-radius: 3px;
        }

        @keyframes bounce {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-20px); }
        }

        @keyframes headShake {
            0% { transform: translateX(-50%) rotate(-10deg); }
            100% { transform: translateX(-50%) rotate(10deg); }
        }

        @keyframes armWaveLeft {
            0% { transform: rotate(-60deg); }
            100% { transform: rotate(30deg); }
        }
        @keyframes armWaveRight {
            0% { transform: rotate(60deg); }
            100% { transform: rotate(-30deg); }
        }
        @keyframes legKickLeft {
            0% { transform: rotate(-30deg); }
            100% { transform: rotate(40deg); }
        }
        @keyframes legKickRight {
            0% { transform: rotate(30deg); }
            100% { transform: rotate(-40deg); }
        }

        .tun-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b9d;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 10px;
            text-shadow: 0 0 30px #ff3366;
            animation: tunBounce 0.4s infinite alternate;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes tunBounce {
            0% { transform: translateX(-50%) translateY(0); opacity: 0.8; }
            100% { transform: translateX(-50%) translateY(-10px); opacity: 1; }
        }

        .pop-67 {
            position: absolute;
            font-size: 50px;
            font-weight: 900;
            color: #a855f7;
            text-shadow: 0 0 30px #7c3aed, 0 0 60px #5b21b6;
            pointer-events: none;
            animation: popUp 1s forwards;
            z-index: 100;
        }

        @keyframes popUp {
            0% {
                opacity: 1;
                transform: translate(-50%, 0) scale(0.5);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -30px) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -120px) scale(0.8);
            }
        }

        .hint {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    <div class="bg-67" id="bg67"></div>

    <div class="game-area" id="gameArea">
        
        <!-- 🎵  МУЗЫКА (MP3) -->
        <!-- 🔽 ПОМЕНЯЙ "gazana.mp3" НА ИМЯ ТВОЕГО ФАЙЛА 🔽 -->
        <audio id="audioPlayer" loop>
            <source src="67.mp3.mp3" type="audio/mpeg">
        </audio>

        <button class="music-btn" id="musicBtn">🔊 ВКЛЮЧИТЬ ГАЗАНА 67</button>

        <div class="counter-wrapper">
            <div class="counter-label">СИКС-СЕВЕНС</div>
            <div class="counter-number" id="counterDisplay">0</div>
        </div>

        <!-- 🖼️  ТАНЦУЮЩАЯ КАРТИНКА -->
        <!-- 🔽 ВСТАВЬ ССЫЛКУ НА СВОЮ КАРТИНКУ/GIF 🔽 -->
        <img 
            src="imagen-italian-brainrot-sounds-quiz-0ori.jpg" 
            alt="Тун тун сахур" 
            class="dancer-image" 
            id="dancerImage"
        >

        <div class="dancer">
            <div class="stickman">
                <div class="head"></div>
                <div class="body"></div>
                <div class="arm-left"></div>
                <div class="arm-right"></div>
                <div class="leg-left"></div>
                <div class="leg-right"></div>
            </div>
        </div>

        <div class="tun-text">ТУН ТУН ТУН САХУР</div>
        <div class="hint">👇 ТЫКАЙ СЮДА 👇</div>
    </div>

    <script>
        (function() {
            const gameArea = document.getElementById('gameArea');
            const counterDisplay = document.getElementById('counterDisplay');
            const musicBtn = document.getElementById('musicBtn');
            const bg67Container = document.getElementById('bg67');
            const audioPlayer = document.getElementById('audioPlayer');

            let counter = 0;
            let musicStarted = false;

            function createBackground67() {
                let html = '';
                for (let i = 0; i < 30; i++) {
                    html += '<span>67</span>';
                }
                bg67Container.innerHTML = html;
            }
            createBackground67();

            function startMusic() {
                if (musicStarted) return;
                
                if (audioPlayer) {
                    audioPlayer.play().then(() => {
                        musicStarted = true;
                        musicBtn.classList.add('hidden');
                        console.log('🎵 МУЗЫКА ИГРАЕТ!');
                    }).catch((err) => {
                        console.log('Нажми на кнопку, чтобы включить музыку');
                        musicBtn.classList.remove('hidden');
                    });
                }
            }

            musicBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                startMusic();
            });

            document.addEventListener('click', startMusic, { once: true });
            document.addEventListener('touchstart', startMusic, { once: true });

            function spawn67(x, y) {
                const el = document.createElement('div');
                el.className = 'pop-67';
                el.textContent = '67';
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                gameArea.appendChild(el);

                setTimeout(() => {
                    el.remove();
                }, 1000);
            }

            // ===========================================================
            // 🔥 ФИКС ДЛЯ ТЕЛЕФОНА — ОБРАБОТКА КАСАНИЙ РАБОТАЕТ!
            // ===========================================================
            function handleClick(e) {
                e.preventDefault();

                if (!musicStarted) {
                    startMusic();
                }

                // Получаем координаты — работает и для мыши, и для пальца!
                let clientX, clientY;
                
                if (e.touches) {
                    // Это касание (телефон)
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    // Это мышь (компьютер)
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                counter++;
                counterDisplay.textContent = counter;

                const rect = gameArea.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                spawn67(x, y);

                if (navigator.vibrate) {
                    navigator.vibrate(20);
                }
            }

            // Клик мыши (компьютер)
            gameArea.addEventListener('click', handleClick);

            // Касание пальцем (телефон) — ПРАВИЛЬНО!
            gameArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleClick(e);
            }, { passive: false });

            // Сброс счётчика долгим нажатием (телефон)
            let longPressTimer;
            gameArea.addEventListener('touchstart', (e) => {
                longPressTimer = setTimeout(() => {
                    counter = 0;
                    counterDisplay.textContent = '0';
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                }, 2000);
            });
            gameArea.addEventListener('touchend', () => clearTimeout(longPressTimer));
            gameArea.addEventListener('touchmove', () => clearTimeout(longPressTimer));

            // Для ПК — сброс по двойному клику с Ctrl
            gameArea.addEventListener('dblclick', (e) => {
                if (e.ctrlKey) {
                    counter = 0;
                    counterDisplay.textContent = '0';
                }
            });

            console.log('🔥 67 GAME РАБОТАЕТ НА ТЕЛЕФОНЕ!');
            console.log('📝 Инструкция:');
            console.log('  1️⃣ Картинка: поменяй "tun.gif" на имя своего файла');
            console.log('  2️⃣ Музыка: поменяй "gazana.mp3" на имя своего файла');
            console.log('  3️⃣ Тапай по экрану — всё работает! 🎉');
        })();
    </script>
</body>
</html>
